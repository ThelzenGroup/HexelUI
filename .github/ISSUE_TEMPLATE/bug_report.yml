name: Bug Report
description: Report a bug or issue with a component
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - Button
        - Input
        - Label
        - Card
        - Badge
        - Alert
        - Separator
        - Avatar
        - Checkbox
        - Switch
        - Select
        - Tabs
        - Tooltip
        - Dialog
        - Dropdown Menu
        - Toast
        - Other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: How can we reproduce this?
      placeholder: |
        1. Install component with `npx hexelui add button`
        2. Use in a form with...
        3. Click the button
        4. See error
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your environment details
      placeholder: |
        - React version: 18.3.1
        - Next.js version: 14.2.0
        - Browser: Chrome 120
        - OS: macOS 14
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, code snippets, or other context
    validations:
      required: false
